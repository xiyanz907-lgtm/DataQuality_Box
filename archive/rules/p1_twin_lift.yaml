# p1_twin_lift.yaml
# 规则配置文件（V2）：P1 - 双箱作业挖掘
#
# 功能：识别 is_twin_lift == 1 的高价值特征数据
# 治理等级：P1 (Asset)
# 处理方式：打标、豁免、打包

meta:
  rule_id: rule_p1_twin_lift
  severity: P1
  description: "双箱作业挖掘：识别 is_twin_lift == 1 的高价值作业"
  owner: data-governance@example.com
  created_at: "2026-01-23"

target_entity: Cycle

input:
  entity_key: entity_cycle

logic:
  type: filter
  filter_expr: "pl.col('is_twin_lift') == 1"

output:
  key: rule_p1_twin_lift_hits
  stage: RESULT

# P1 资产配置（数据驱动字段映射）
asset:
  enabled: true
  asset_type: TWIN_LIFT_SCENARIO
  field_mapping:
    asset_id: cycle_id
    vehicle_id: vehicle_id
    start_ts: start_time
    end_ts: end_time
  tags:
    - twin_lift
    - feature
    - high_value
  target_path_template: "corner_case/{batch_id}/{asset_id}/"

depends_on: []
