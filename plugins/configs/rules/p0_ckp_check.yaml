# Checkpoint log部分阶段任务不可为空
meta:
  rule_id: rule_p0_ckp_check
  severity: P0
  description: "Checkpoint log部分阶段任务不可为空：3-4"
  owner: data-governance@example.com
  created_at: "2026-02-28"

# 目标实体
target_entity: Cycle

# 输入数据（从 Context 读取）
input:
  key: entity_cycle  # 引用 Adapter 写入的实体数据

logic:
  filter_expr: "pl.col('ckp_3to4_total_time').is_null() | pl.col('ckp_7to8_total_time').is_null()"

# 输出配置
output:
  key: rule_p0_ckp_check_hits  # 写入 Context 的 key
  stage: RESULT                  # 数据阶段

# 告警配置
alert:
  enabled: true
  template: "Checkpoint log部分阶段任务不可为空: {trigger_cycle_ids}"
  title: "[Checkpoint log]有阶段任务为空：3-4/7-8"

# 依赖关系（此规则不依赖其他规则）
depends_on: []