# 单圈作业时长 2小时还没干完活，需要告警
meta:
  rule_id: rule_p0_running_time
  severity: P0
  description: "运行时间校验：识别单圈作业时间异常的数据"
  owner: data-governance@example.com
  created_at: "2026-02-06"

# 目标实体
target_entity: Cycle

# 输入数据（从 Context 读取）
input:
  key: entity_cycle  # 引用 Adapter 写入的实体数据

# 规则逻辑（Polars 表达式）
logic:
  # 过滤条件：running_time > 1000
  filter_expr: "pl.col('running_time') > 120"

# 输出配置
output:
  key: rule_p0_running_time_hits  # 写入 Context 的 key
  stage: RESULT                  # 数据阶段