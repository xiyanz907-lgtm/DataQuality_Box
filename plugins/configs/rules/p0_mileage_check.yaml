# checkpoint_log mileage字段校验，若里程为0，箱数不可能大于0
meta:
  rule_id: rule_p0_mileage_check
  severity: P0
  description: "mileage字段校验：识别mileage异常数据"
  owner: data-governance@example.com
  created_at: "2026-02-06"

# 目标实体
target_entity: Cycle

# 输入数据（从 Context 读取）
input:
  key: entity_cycle  # 引用 Adapter 写入的实体数据

logic:
  filter_expr: "pl.col('mileage') == 0 and pl.col('box') > 0"

# 输出配置
output:
  key: rule_p0_mileage_check_hits  # 写入 Context 的 key
  stage: RESULT                  # 数据阶段

# 告警配置
alert:
  enabled: true
  template: "mileage字段异常: {trigger_cycle_ids}"
  title: "P0 告警：mileage字段校验"

# 依赖关系（此规则不依赖其他规则）
depends_on: []