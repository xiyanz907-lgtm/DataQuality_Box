# 三张表间无箱数差异
meta:
  rule_id: rule_p0_box_count
  severity: P0
  description: "箱数差异校验：识别三张表间箱数差异的数据"
  owner: data-governance@example.com
  created_at: "2026-02-06"

# 目标实体
target_entity: Cycle

# 输入数据（从 Context 读取）
input:
  key: entity_cycle  # 引用 Adapter 写入的实体数据 
  # 过滤条件：diff_box_count1 == 0 and diff_box_count2 == 0

logic:
  filter_expr: "pl.col('diff_box_count1') == 0 and pl.col('diff_box_count2') == 0"

# 输出配置
output:
  key: rule_p0_box_count_hits  # 写入 Context 的 key
  stage: RESULT                  # 数据阶段

# 告警配置
alert:
  enabled: true
  template: "箱数差异异常: {trigger_cycle_ids}"
  title: "P0 告警：箱数差异校验"

# 依赖关系（此规则不依赖其他规则）
depends_on: []