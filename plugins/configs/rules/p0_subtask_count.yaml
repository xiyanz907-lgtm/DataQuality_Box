# 如果箱数大于零，任务一定有两个阶段，subtask字段和page_time字段不为空
meta:
  rule_id: rule_p0_subtask_count
  severity: P0
  description: "子任务数量校验：识别子任务数量异常的数据"
  owner: data-governance@example.com
  created_at: "2026-02-06"

# 目标实体
target_entity: Cycle

# 输入数据（从 Context 读取）
input:
  key: entity_cycle  # 引用 Adapter 写入的实体数据
  # 过滤条件：subtask_count > 1

logic:
  filter_expr: "pl.col('box') > 0 and pl.col('non_null_subtask_count') > 1 and pl.col('non_null_page_time_count') > 1"

# 输出配置
output:
  key: rule_p0_subtask_count_hits  # 写入 Context 的 key
  stage: RESULT                  # 数据阶段

# 告警配置
alert:
  enabled: true
  template: "子任务数量异常: {trigger_cycle_ids}"
  title: "P0 告警：子任务数量校验"

# 依赖关系（此规则不依赖其他规则）
depends_on: []