# ============================================================
# 示例1: CRON 定时触发的数据治理 DAG
# 每日凌晨2点提取作业周期数据并执行治理
# ============================================================

source_meta:
  id: "daily_cycle_etl"
  name: "每日作业周期数据提取"
  description: "从MySQL提取作业周期数据，执行数据质量检查和资产识别"
  target_entity: "Cycle"  # 目标实体类型，系统会自动加载 adapters/cycle_adapter.yaml
  owner: "box_admin"
  tags: ["production", "daily", "cycle"]

# 调度策略
scheduling:
  trigger_mode: "CRON"
  cron_expression: "0 8 * * *"  # 每天上午八点（UTC时间）检查前一天的数据
  
  # 可选：前置传感器，确保上游数据就绪
  sensor:
    enabled: true
    type: "SQL"
    sql: |
      SELECT COUNT(*) >= 1
      FROM cycle_section_summary
      WHERE DATE(shift_date) = '{{ ds }}'
    conn_id: "datalog_mysql_conn"
    timeout: 1800      # 30分钟超时
    poke_interval: 300  # 每5分钟检查一次
    mode: "reschedule"  # 释放worker slot

# 数据提取配置（支持多数据源）
extractions:
  - id: "raw_cycle_section"
    source_type: "mysql"
    conn_id: "datalog_mysql_conn"
    query: |
      SELECT 
        cycle_id,
        vehicle_id,
        box,
        shift_date,
        cycle_start_time as start_time,
        cycle_end_time as end_time,
        TIMESTAMPDIFF(SECOND, cycle_start_time, cycle_end_time) AS duration,
        task_type,
        running_time,
        mileage,
        power_consumption,
        ckp_3to4_total_time,
        ckp_7to8_total_time
      FROM cycle_section_summary
      WHERE DATE(shift_date) = '{{ ds }}'
    output_key: "raw_cycle_section"
    alt_key: null

  - id: "raw_cycle_subtarget"
    source_type: "mysql"
    conn_id: "datalog_mysql_conn"
    query: |
      SELECT
        TRACTOR_CYCLE_ID AS cycle_id,
        TWIN_LIFT_INDICATOR AS is_twin_lift,
        BOX AS box,
        SUBTASK_TYPE_1 AS subtask_type_1,
        SUBTASK_TYPE_2 AS subtask_type_2,
        SUBTASK_TYPE_3 AS subtask_type_3,
        SUBTASK_TYPE_4 AS subtask_type_4,
        SUBTASK_TYPE_5 AS subtask_type_5,
        SUBTASK_TYPE_6 AS subtask_type_6,
        SUBTASK_TYPE_7 AS subtask_type_7,
        SUBTASK_TYPE_8 AS subtask_type_8,
        PAGE_TIME_1_SUBTASK AS page_time_1_subtask,
        PAGE_TIME_2_SUBTASK AS page_time_2_subtask,
        PAGE_TIME_3_SUBTASK AS page_time_3_subtask,
        PAGE_TIME_4_SUBTASK AS page_time_4_subtask,
        PAGE_TIME_5_SUBTASK AS page_time_5_subtask,
        PAGE_TIME_6_SUBTASK AS page_time_6_subtask,
        PAGE_TIME_7_SUBTASK AS page_time_7_subtask,
        PAGE_TIME_8_SUBTASK AS page_time_8_subtask
      FROM subtarget_vehicle_cycle
      WHERE DATE(shift_date) = '{{ ds }}'
    output_key: "raw_cycle_subtarget"
    alt_key: null

  - id: "raw_cycle_summary"
    source_type: "mysql"
    conn_id: "datalog_mysql_conn"
    query: |
      SELECT
        cycle_id,
        box,
        total_size,
        mileage,
        mileage_all,
        total_speed,
        total_travel_speed,
        (power_consumption/box) as power_per_box,
        (power_consumption/mileage) as power_per_km,
        idle as idle_time
      FROM daily_cycle_overall
      WHERE DATE(shift_date) = '{{ ds }}'
    output_key: "raw_cycle_summary"
    alt_key: null

  - id: "raw_ngen_box_count"
    source_type: "mysql"
    conn_id: "ngen_mysql_conn"
    query: |
      SELECT
        TRACTOR_CYCLE_ID AS cycle_id,
        COUNT(*) AS box
      FROM ngen
      WHERE last_modified_timestamp >= DATE_SUB('{{ ds }}', INTERVAL 1 DAY) AND TRACTOR_NO LIKE 'AT%'
      GROUP BY TRACTOR_CYCLE_ID
    output_key: "raw_ngen_box_count"
    alt_key: null

  - id: "raw_total_mileage"
    source_type: "mysql"
    conn_id: "datalog_mysql_conn"
    query: |
      SELECT
        id,
        site_type,
        vehicle_id,
        shift_date,
        mileage_distance
      FROM history_total_mileage
      WHERE DATE(shift_date) = '{{ ds }}'
    output_key: "raw_total_mileage"
    alt_key: null

# Adapter 配置（多 Adapter 并行）
adapters:
  - id: "cycle"
    config_path: "configs/adapters/cycle_adapter.yaml"
  - id: "TotalMileage"
    config_path: "configs/adapters/TotalMileage_adapter.yaml"

# 可选：覆盖全局 default_args
default_args:
  retries: 3
  retry_delay_minutes: 10
  #email: ["xiyan.zhou@westwell-lab.com","zhishang.feng@westwell-lab.com","feiyang.ling@westwell-lab.com","xiaofu.pan@westwell-lab.com"]
  email: ["xiyan.zhou@westwell-lab.com"]

# 通知配置（告警邮件的收件人）
notification:
  email_to: ["xiyan.zhou@westwell-lab.com"]
  #email_to: ["xiyan.zhou@westwell-lab.com","zhishang.feng@westwell-lab.com","feiyang.ling@westwell-lab.com","xiaofu.pan@westwell-lab.com"]
  # email_cc: ["manager@westwell-lab.com"]

# 结果持久化配置（可选，默认启用）
report:
  enabled: true
  conn_id: "qa_mysql_conn"

# 资产打包配置（可选，默认启用）
asset_packing:
  enabled: true  # 是否保存 P1 资产到数据库队列
  conn_id: "qa_mysql_conn"  # 数据库连接ID
  table: "auto_test_case_catalog"  # 元数据表名
